<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sub Admin - Reunion 2026</title>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- SWEET ALERT 2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body { 
            background: #f0f2f5; 
            min-height: 100vh;
        }

        /* --- DISABLED ACCESS SECTION --- */
        #disabledSection { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh; 
            background: #f0f2f5; z-index: 9999; display: flex; 
            justify-content: center; align-items: center; 
        }
        .disabled-card { 
            background: white; padding: 40px 30px; border-radius: 20px; 
            width: 90%; max-width: 400px; text-align: center; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
        }
        .disabled-card i { font-size: 60px; color: #e74c3c; margin-bottom: 20px; }
        .disabled-card h2 { color: #2c3e50; margin-bottom: 10px; font-weight: 700; }
        .disabled-card p { color: #7f8c8d; font-size: 14px; line-height: 1.5; }

        /* --- HEADER --- */
        #mainContent { display: none; padding-bottom: 50px; }
        .header {
            background: white; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            display: flex; justify-content: center; align-items: center;
            position: sticky; top: 0; z-index: 100;
        }
        .header h3 { color: #2c3e50; font-weight: 700; font-size: 20px; }

        /* --- GRID CONTAINER --- */
        .container { padding: 20px; max-width: 1200px; margin: auto; }
        .status-text { margin-bottom: 20px; color: #7f8c8d; font-size: 13px; text-align: center; background: white; padding: 10px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05);}
        
        .grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px;
        }

        /* --- USER CARD --- */
        .card {
            background: white; border-radius: 15px; padding: 20px; text-align: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05); border: 1px solid #eee;
            transition: all 0.4s ease; position: relative; overflow: hidden;
        }
        .card.completed {
            transform: scale(0.9); opacity: 0; pointer-events: none;
        }

        .profile-pic {
            width: 100px; height: 100px; border-radius: 50%; object-fit: cover;
            border: 3px solid #f0f2f5; margin-bottom: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .info-row {
            display: flex; justify-content: space-between; align-items: center;
            background: #f8f9fa; padding: 10px 15px; border-radius: 10px; margin-bottom: 10px;
        }
        .info-text { font-size: 14px; font-weight: 600; color: #2c3e50; text-align: left; }
        .info-label { font-size: 10px; color: #95a5a6; display: block; text-transform: uppercase; }

        /* --- ACTION BUTTONS --- */
        .action-btn {
            background: #e3f2fd; color: #1976d2; border: none; width: 35px; height: 35px;
            border-radius: 8px; cursor: pointer; display: flex; justify-content: center; align-items: center;
            transition: 0.3s;
        }
        .action-btn:hover { background: #1976d2; color: white; }
        
        .action-btn.done {
            background: #e8f5e9; color: #27ae60; cursor: default; pointer-events: none;
        }

        .save-pic-btn {
            width: 100%; padding: 12px; background: linear-gradient(135deg, #11998e, #38ef7d);
            color: white; border: none; border-radius: 10px; font-weight: 600; cursor: pointer;
            display: flex; justify-content: center; align-items: center; gap: 8px; transition: 0.3s;
        }
        .save-pic-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(56, 239, 125, 0.4); }
        .save-pic-btn.done { background: #bdc3c7; box-shadow: none; pointer-events: none; }

        /* Empty State & Loader */
        .empty-state { text-align: center; padding: 50px 20px; color: #95a5a6; grid-column: 1/-1; }
        .empty-state i { font-size: 50px; margin-bottom: 15px; color: #bdc3c7; }
        .loader { font-size: 24px; color: #3498db; margin-bottom: 15px; }

    </style>
</head>
<body>

    <!-- DISABLED ACCESS SECTION (Shows if switch is OFF) -->
    <div id="disabledSection">
        <div class="disabled-card">
            <i class="fas fa-lock loader" id="statusIcon"></i>
            <h2 id="statusTitle">Checking Access...</h2>
            <p id="statusMsg">Please wait while we verify your access.</p>
        </div>
    </div>

    <!-- MAIN CONTENT -->
    <div id="mainContent">
        <div class="header">
            <h3><i class="fas fa-id-card"></i> Card Maker Panel</h3>
        </div>

        <div class="container">
            <div class="status-text">
                <i class="fas fa-info-circle"></i> Showing Approved Users from Feb 28, 2026.<br>
                Complete all 3 actions (Copy Name, Copy Batch, Save Pic) to automate removal.
            </div>

            <div class="grid" id="userGrid">
                <!-- Cards will be injected here -->
            </div>
        </div>
    </div>

    <!-- FIREBASE SCRIPTS (Auth Removed to Prevent Crash) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, where, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // --- FIREBASE CONFIGURATION ---
        const firebaseConfig = {
            apiKey: "AIzaSyB-n-SgnGwn1P9b-1Xkv3S5QM4U1zHa5nQ",
            authDomain: "bb-high-school-reunion-2026.firebaseapp.com",
            projectId: "bb-high-school-reunion-2026",
            storageBucket: "bb-high-school-reunion-2026.firebasestorage.app",
            messagingSenderId: "54413925090",
            appId: "1:54413925090:web:b6ac44faf6313dc19b1cbb"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // State Tracking for each user: { userId: { name: false, batch: false, pic: false } }
        let actionState = {};
        const CUTOFF_DATE = new Date('2026-02-28T00:00:00').getTime();
        let usersListener = null;

        // --- REALTIME ACCESS CHECK (MASTER ADMIN SWITCH) ---
        const configRef = doc(db, "config", "fees");
        onSnapshot(configRef, (configSnap) => {
            if (configSnap.exists()) {
                const isActive = configSnap.data().sub_admin_login_active;
                
                if (isActive === true) {
                    // Switch is ON: Allow Access
                    document.getElementById('disabledSection').style.display = 'none';
                    document.getElementById('mainContent').style.display = 'block';
                    
                    // Start loading users if not already started
                    if (!usersListener) {
                        loadApprovedUsers();
                    }
                } else {
                    // Switch is OFF: Block Access
                    document.getElementById('mainContent').style.display = 'none';
                    document.getElementById('disabledSection').style.display = 'flex';
                    
                    // Update disabled message
                    document.getElementById('statusIcon').className = "fas fa-ban";
                    document.getElementById('statusTitle').innerText = "Access Disabled";
                    document.getElementById('statusMsg').innerText = "Master Admin has disabled access to the Card Maker Panel.";

                    // Stop fetching users to save bandwidth
                    if (usersListener) {
                        usersListener(); 
                        usersListener = null;
                    }
                }
            }
        }, (error) => {
            console.error("Error fetching config:", error);
            document.getElementById('statusTitle').innerText = "Connection Error";
            document.getElementById('statusMsg').innerText = "Failed to connect to the database. Please check your internet.";
        });


        // --- LOAD DATA REALTIME ---
        function loadApprovedUsers() {
            const q = query(collection(db, "students"), where("payment_status", "==", "Approved"));
            
            usersListener = onSnapshot(q, (snapshot) => {
                const grid = document.getElementById('userGrid');
                grid.innerHTML = "";
                let count = 0;

                snapshot.forEach(docSnap => {
                    const u = docSnap.data();
                    const id = docSnap.id;

                    // Condition 1: Check if already processed
                    if (u.sub_admin_processed === true) return;

                    // Condition 2: Filter from Feb 28, 2026 onwards
                    let userTime = u.timestamp;
                    if (userTime && typeof userTime === 'object' && userTime.seconds) {
                        userTime = userTime.seconds * 1000;
                    }
                    if (userTime && userTime < CUTOFF_DATE) return;

                    count++;
                    
                    if (!actionState[id]) {
                        actionState[id] = { name: false, batch: false, pic: false };
                    }

                    // Render Card
                    grid.innerHTML += `
                        <div class="card" id="card-${id}">
                            <img src="${u.photo}" class="profile-pic" id="pic-${id}" alt="Profile">
                            
                            <div class="info-row">
                                <div>
                                    <span class="info-label">Name</span>
                                    <div class="info-text" id="name-${id}">${u.name}</div>
                                </div>
                                <button class="action-btn ${actionState[id].name ? 'done' : ''}" 
                                        id="btn-name-${id}" onclick="copyData('${id}', 'name', '${u.name.replace(/'/g, "\\'")}')">
                                    <i class="fas ${actionState[id].name ? 'fa-check' : 'fa-copy'}"></i>
                                </button>
                            </div>

                            <div class="info-row" style="margin-bottom: 20px;">
                                <div>
                                    <span class="info-label">Batch</span>
                                    <div class="info-text" id="batch-${id}">${u.batch}</div>
                                </div>
                                <button class="action-btn ${actionState[id].batch ? 'done' : ''}" 
                                        id="btn-batch-${id}" onclick="copyData('${id}', 'batch', '${u.batch}')">
                                    <i class="fas ${actionState[id].batch ? 'fa-check' : 'fa-copy'}"></i>
                                </button>
                            </div>

                            <button class="save-pic-btn ${actionState[id].pic ? 'done' : ''}" 
                                    id="btn-pic-${id}" onclick="savePicture('${id}', '${u.photo}', '${u.name.replace(/'/g, "\\'")}')">
                                <i class="fas ${actionState[id].pic ? 'fa-check-circle' : 'fa-download'}"></i> 
                                ${actionState[id].pic ? 'Picture Saved' : 'Save Picture'}
                            </button>
                        </div>
                    `;
                });

                if (count === 0) {
                    grid.innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-box-open"></i>
                            <h3>No Pending Work!</h3>
                            <p>All approved users from Feb 28 have been processed.</p>
                        </div>
                    `;
                }
            });
        }

        // --- ACTION: COPY DATA ---
        window.copyData = function(id, type, text) {
            navigator.clipboard.writeText(text).then(() => {
                const btn = document.getElementById(`btn-${type}-${id}`);
                btn.classList.add('done');
                btn.innerHTML = '<i class="fas fa-check"></i>';
                showToast(`${type.charAt(0).toUpperCase() + type.slice(1)} Copied!`);
                
                actionState[id][type] = true;
                checkCompletion(id);
            }).catch(err => {
                console.error("Copy failed", err);
                alert("Failed to copy text!");
            });
        }

        // --- ACTION: SAVE PICTURE ---
        window.savePicture = async function(id, imageUrl, userName) {
            const btn = document.getElementById(`btn-pic-${id}`);
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';

            try {
                const response = await fetch(imageUrl); 
                const blob = await response.blob(); 
                const blobUrl = window.URL.createObjectURL(blob);
                
                const link = document.createElement('a'); 
                link.href = blobUrl; 
                link.download = `${userName.replace(/\s+/g, '_')}_Profile.jpg`;
                document.body.appendChild(link); 
                link.click(); 
                document.body.removeChild(link); 
                window.URL.revokeObjectURL(blobUrl);

                btn.classList.add('done');
                btn.innerHTML = '<i class="fas fa-check-circle"></i> Picture Saved';
                showToast("Picture Downloaded!");

                actionState[id].pic = true;
                checkCompletion(id);

            } catch (error) {
                window.open(imageUrl, '_blank'); 
                btn.classList.add('done');
                btn.innerHTML = '<i class="fas fa-check-circle"></i> Picture Saved';
                actionState[id].pic = true;
                checkCompletion(id);
            }
        }

        // --- LOGIC: CHECK IF ALL 3 ARE COMPLETED ---
        async function checkCompletion(id) {
            const state = actionState[id];
            if (state.name && state.batch && state.pic) {
                const card = document.getElementById(`card-${id}`);
                card.classList.add('completed');
                
                Swal.fire({
                    toast: true, position: 'top-end', showConfirmButton: false, timer: 2000,
                    icon: 'success', title: 'Task Completed! Moving to next...'
                });

                try {
                    const docRef = doc(db, "students", id);
                    await updateDoc(docRef, { sub_admin_processed: true });
                } catch (error) {
                    console.error("Error updating DB:", error);
                }
            }
        }

        // Toast Notification Helper
        function showToast(msg) {
            Swal.fire({
                toast: true, position: 'bottom-end', showConfirmButton: false, timer: 1500,
                icon: 'info', title: msg, background: '#333', color: '#fff'
            });
        }

    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sub Admin - Reunion 2026</title>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- SWEET ALERT 2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body { 
            background: #f0f2f5; 
            min-height: 100vh;
        }

        /* --- DISABLED ACCESS SECTION --- */
        #disabledSection { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh; 
            background: #f0f2f5; z-index: 9999; display: flex; 
            justify-content: center; align-items: center; 
        }
        .disabled-card { 
            background: white; padding: 40px 30px; border-radius: 20px; 
            width: 90%; max-width: 400px; text-align: center; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
        }
        .disabled-card i { font-size: 60px; color: #e74c3c; margin-bottom: 20px; }
        .disabled-card h2 { color: #2c3e50; margin-bottom: 10px; font-weight: 700; }
        .disabled-card p { color: #7f8c8d; font-size: 14px; line-height: 1.5; }

        /* --- HEADER --- */
        #mainContent { display: none; padding-bottom: 50px; }
        .header {
            background: white; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            display: flex; justify-content: center; align-items: center;
            position: sticky; top: 0; z-index: 100;
        }
        .header h3 { color: #2c3e50; font-weight: 700; font-size: 20px; }

        /* --- GRID CONTAINER --- */
        .container { padding: 20px; max-width: 1200px; margin: auto; }
        .status-text { margin-bottom: 20px; color: #7f8c8d; font-size: 13px; text-align: center; background: white; padding: 15px 10px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05);}
        .total-count-badge { display: inline-block; margin-top: 8px; font-size: 15px; color: #1976d2; font-weight: 700; background: #e3f2fd; padding: 5px 15px; border-radius: 20px; }

        .grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px;
        }

        /* --- USER CARD --- */
        .card {
            background: white; border-radius: 15px; padding: 20px; text-align: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05); border: 1px solid #eee;
            transition: all 0.4s ease; position: relative; overflow: hidden;
        }
        .card.completed {
            transform: scale(0.9); opacity: 0; pointer-events: none; display: none;
        }

        .profile-pic {
            width: 100px; height: 100px; border-radius: 50%; object-fit: cover;
            border: 3px solid #f0f2f5; margin-bottom: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .info-row {
            display: flex; justify-content: space-between; align-items: center;
            background: #f8f9fa; padding: 10px 15px; border-radius: 10px; margin-bottom: 8px;
        }
        .info-content { text-align: left; width: 100%; }
        .info-text { font-size: 14px; font-weight: 600; color: #2c3e50; word-break: break-word; }
        .info-label { font-size: 10px; color: #95a5a6; display: block; text-transform: uppercase; margin-bottom: 2px; }

        /* --- ACTION BUTTONS --- */
        .action-btn {
            background: #e3f2fd; color: #1976d2; border: none; width: 35px; height: 35px; min-width: 35px;
            border-radius: 8px; cursor: pointer; display: flex; justify-content: center; align-items: center;
            transition: 0.3s; margin-left: 10px;
        }
        .action-btn:hover { background: #1976d2; color: white; }
        .action-btn.done { background: #e8f5e9; color: #27ae60; cursor: default; }

        /* Save Picture Button */
        .save-pic-btn {
            width: 100%; padding: 10px; background: #34495e;
            color: white; border: none; border-radius: 10px; font-weight: 500; cursor: pointer;
            display: flex; justify-content: center; align-items: center; gap: 8px; transition: 0.3s;
            margin-bottom: 10px; font-size: 13px;
        }
        .save-pic-btn:hover { background: #2c3e50; }
        
        /* DONE BUTTON (New) */
        .mark-done-btn {
            width: 100%; padding: 12px; background: linear-gradient(135deg, #11998e, #38ef7d);
            color: white; border: none; border-radius: 10px; font-weight: 700; cursor: pointer;
            display: flex; justify-content: center; align-items: center; gap: 8px; transition: 0.3s;
            margin-top: 15px; font-size: 15px;
        }
        .mark-done-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(56, 239, 125, 0.4); }

        /* Empty State & Loader */
        .empty-state { text-align: center; padding: 50px 20px; color: #95a5a6; grid-column: 1/-1; }
        .empty-state i { font-size: 50px; margin-bottom: 15px; color: #bdc3c7; }
        .loader { font-size: 24px; color: #3498db; margin-bottom: 15px; }

    </style>
</head>
<body>

    <!-- DISABLED ACCESS SECTION -->
    <div id="disabledSection">
        <div class="disabled-card">
            <i class="fas fa-lock loader" id="statusIcon"></i>
            <h2 id="statusTitle">Checking Access...</h2>
            <p id="statusMsg">Please wait while we verify your access.</p>
        </div>
    </div>

    <!-- MAIN CONTENT -->
    <div id="mainContent">
        <div class="header">
            <h3><i class="fas fa-id-card"></i> Card Maker Panel</h3>
        </div>

        <div class="container">
            <div class="status-text">
                <i class="fas fa-info-circle"></i> Showing Approved Users from <b>SL 270</b> onwards.<br>
                Use the buttons below to copy Number and Save Picture.<br>
                <b>Click "DONE" when finished to remove the card.</b><br>
                <span class="total-count-badge" id="totalCountDisplay">Total Pending: Loading...</span>
            </div>

            <div class="grid" id="userGrid">
                <!-- Cards will be injected here -->
            </div>
        </div>
    </div>

    <!-- FIREBASE SCRIPTS -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, where, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // --- FIREBASE CONFIGURATION ---
        const firebaseConfig = {
            apiKey: "AIzaSyB-n-SgnGwn1P9b-1Xkv3S5QM4U1zHa5nQ",
            authDomain: "bb-high-school-reunion-2026.firebaseapp.com",
            projectId: "bb-high-school-reunion-2026",
            storageBucket: "bb-high-school-reunion-2026.firebasestorage.app",
            messagingSenderId: "54413925090",
            appId: "1:54413925090:web:b6ac44faf6313dc19b1cbb"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let usersListener = null;

        // --- REALTIME ACCESS CHECK ---
        const configRef = doc(db, "config", "fees");
        onSnapshot(configRef, (configSnap) => {
            if (configSnap.exists()) {
                const isActive = configSnap.data().sub_admin_login_active;
                
                if (isActive === true) {
                    document.getElementById('disabledSection').style.display = 'none';
                    document.getElementById('mainContent').style.display = 'block';
                    if (!usersListener) loadApprovedUsers();
                } else {
                    document.getElementById('mainContent').style.display = 'none';
                    document.getElementById('disabledSection').style.display = 'flex';
                    document.getElementById('statusIcon').className = "fas fa-ban";
                    document.getElementById('statusTitle').innerText = "Access Disabled";
                    document.getElementById('statusMsg').innerText = "Master Admin has disabled access.";
                    if (usersListener) { usersListener(); usersListener = null; }
                }
            }
        });

        // --- LOAD DATA REALTIME ---
        function loadApprovedUsers() {
            const q = query(collection(db, "students"), where("payment_status", "==", "Approved"));
            
            usersListener = onSnapshot(q, (snapshot) => {
                const grid = document.getElementById('userGrid');
                grid.innerHTML = "";
                let validUsers = []; 

                snapshot.forEach(docSnap => {
                    const u = docSnap.data();
                    const id = docSnap.id;

                    if (u.sub_admin_processed === true) return;

                    let slNumber = parseInt(u.serial_number, 10); 
                    if (isNaN(slNumber) || slNumber < 270) return; 

                    validUsers.push({ id, u, slNumber });
                });

                validUsers.sort((a, b) => a.slNumber - b.slNumber);
                document.getElementById('totalCountDisplay').innerText = `Total Pending: ${validUsers.length} Cards`;

                validUsers.forEach(userData => {
                    const { id, u } = userData;
                    
                    // Handle potential missing fields
                    const phone = u.number || u.phone || "N/A";
                    const address = u.address || u.village || "N/A";

                    grid.innerHTML += `
                        <div class="card" id="card-${id}">
                            <img src="${u.photo}" class="profile-pic" alt="Profile">
                            
                            <!-- Save Picture Button -->
                            <button class="save-pic-btn" onclick="savePicture('${id}', '${u.photo}', '${u.name.replace(/'/g, "\\'")}')">
                                <i class="fas fa-download"></i> Save Picture
                            </button>

                            <!-- Name (No Copy) -->
                            <div class="info-row">
                                <div class="info-content">
                                    <span class="info-label">Name (SL: ${u.serial_number})</span>
                                    <div class="info-text">${u.name}</div>
                                </div>
                            </div>

                            <!-- Batch (No Copy) -->
                            <div class="info-row">
                                <div class="info-content">
                                    <span class="info-label">Batch</span>
                                    <div class="info-text">${u.batch}</div>
                                </div>
                            </div>

                            <!-- Address (No Copy) -->
                            <div class="info-row">
                                <div class="info-content">
                                    <span class="info-label">Address</span>
                                    <div class="info-text">${address}</div>
                                </div>
                            </div>

                            <!-- Number (With Copy Button) -->
                            <div class="info-row">
                                <div class="info-content">
                                    <span class="info-label">Phone Number</span>
                                    <div class="info-text">${phone}</div>
                                </div>
                                <button class="action-btn" onclick="copyNumber(this, '${phone}')">
                                    <i class="fas fa-copy"></i>
                                </button>
                            </div>

                            <!-- MARK AS DONE BUTTON -->
                            <button class="mark-done-btn" onclick="markAsDone('${id}')">
                                <i class="fas fa-check-double"></i> DONE
                            </button>
                        </div>
                    `;
                });

                if (validUsers.length === 0) {
                    grid.innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-box-open"></i>
                            <h3>No Pending Work!</h3>
                            <p>All approved users from SL 270 have been processed.</p>
                        </div>
                    `;
                }
            });
        }

        // --- ACTION: COPY NUMBER ---
        window.copyNumber = function(btn, text) {
            navigator.clipboard.writeText(text).then(() => {
                // Change icon temporarily
                const originalContent = btn.innerHTML;
                btn.innerHTML = '<i class="fas fa-check"></i>';
                btn.classList.add('done');
                
                showToast(`Number Copied!`);
                
                // Revert button after 2 seconds
                setTimeout(() => {
                    btn.innerHTML = '<i class="fas fa-copy"></i>';
                    btn.classList.remove('done');
                }, 2000);

            }).catch(err => {
                alert("Failed to copy number!");
            });
        }

        // --- ACTION: SAVE PICTURE ---
        window.savePicture = async function(id, imageUrl, userName) {
            try {
                const response = await fetch(imageUrl); 
                const blob = await response.blob(); 
                const blobUrl = window.URL.createObjectURL(blob);
                
                const link = document.createElement('a'); 
                link.href = blobUrl; 
                link.download = `${userName.replace(/\s+/g, '_')}_Profile.jpg`;
                document.body.appendChild(link); 
                link.click(); 
                document.body.removeChild(link); 
                window.URL.revokeObjectURL(blobUrl);

                showToast("Picture Downloaded!");
            } catch (error) {
                window.open(imageUrl, '_blank'); 
                showToast("Opened Picture in New Tab");
            }
        }

        // --- ACTION: MARK AS DONE ---
        window.markAsDone = function(id) {
            Swal.fire({
                title: 'Are you sure?',
                text: "This card will be removed from the list!",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#3085d6',
                cancelButtonColor: '#d33',
                confirmButtonText: 'Yes, Done!'
            }).then(async (result) => {
                if (result.isConfirmed) {
                    const card = document.getElementById(`card-${id}`);
                    card.classList.add('completed'); // Hide visually
                    
                    try {
                        const docRef = doc(db, "students", id);
                        await updateDoc(docRef, { sub_admin_processed: true });
                        
                        Swal.fire({
                            toast: true, position: 'top-end', showConfirmButton: false, timer: 1500,
                            icon: 'success', title: 'Marked as Done!'
                        });
                    } catch (error) {
                        console.error("Error updating DB:", error);
                        card.classList.remove('completed'); // Show again if error
                        alert("Database Error! Check internet.");
                    }
                }
            })
        }

        // Toast Notification Helper
        function showToast(msg) {
            Swal.fire({
                toast: true, position: 'bottom-end', showConfirmButton: false, timer: 1500,
                icon: 'success', title: msg, background: '#333', color: '#fff'
            });
        }

    </script>
</body>
</html>
